services:
  crm:
    build: .
    container_name: marketboss-crm-core
    ports:
      - "8080:8080"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
      - crm_data:/app/data/db
    command: python -m uvicorn src.interfaces.http.app:app --host 0.0.0.0 --port 8080 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  seed:
    build: .
    container_name: marketboss-crm-seed
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
      - crm_data:/app/data/db
    command: python scripts/seed_demo.py
    profiles: ["seed"]

volumes:
  crm_data:
